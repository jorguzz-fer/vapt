name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-types:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check — shared
        run: pnpm --filter @vapt/shared check-types

      - name: Type check — db
        run: pnpm --filter @vapt/db check-types

      - name: Type check — api
        run: pnpm --filter @vapt/api check-types

      - name: Type check — web
        run: pnpm --filter @vapt/web check-types

  build-api:
    name: Build API
    runs-on: ubuntu-latest
    needs: check-types
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API
        run: pnpm --filter @vapt/api build

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: check-types
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Web
        run: pnpm --filter @vapt/web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3333
